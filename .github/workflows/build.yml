name: Build MFC Wallets

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        submodules: recursive
      
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libtool autotools-dev automake pkg-config bsdmainutils python3
        sudo apt-get install -y libevent-dev libboost-system-dev libboost-filesystem-dev libboost-test-dev libboost-thread-dev
        sudo apt-get install -y libdb++-dev libminiupnpc-dev libzmq3-dev
        sudo apt-get install -y libqt5gui5 libqt5core5a libqt5dbus5 qttools5-dev qttools5-dev-tools
        sudo apt-get install -y libprotobuf-dev protobuf-compiler libqrencode-dev
        
    - name: Build MFC
      run: |
        chmod +x autogen.sh
        chmod +x share/genbuild.sh
        ./autogen.sh
        ./configure --with-gui=qt5
        make -j$(nproc)
        
    - name: Create Linux artifacts
      run: |
        mkdir -p release/linux
        cp src/multicoind release/linux/
        cp src/multicoin-cli release/linux/
        cp src/multicoin-tx release/linux/
        cp src/qt/multicoin-qt release/linux/
        cd release/linux
        tar -czf multicoin-linux-x64.tar.gz *
        
    - name: Upload Linux binaries
      uses: actions/upload-artifact@v4
      with:
        name: multicoin-linux-x64
        path: release/linux/multicoin-linux-x64.tar.gz

  build-windows:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        submodules: recursive
      
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libtool autotools-dev automake pkg-config bsdmainutils curl git
        sudo apt-get install -y g++-mingw-w64-x86-64 mingw-w64-x86-64-dev
        
    - name: Build dependencies
      run: |
        cd depends
        find . -name "*.sh" -exec chmod +x {} \;
        make HOST=x86_64-w64-mingw32 -j$(nproc)
        
    - name: Build MFC for Windows
      run: |
        chmod +x autogen.sh
        chmod +x share/genbuild.sh
        ./autogen.sh
        CONFIG_SITE=$PWD/depends/x86_64-w64-mingw32/share/config.site ./configure --prefix=/
        make -j$(nproc)
        
    - name: Create Windows artifacts
      run: |
        mkdir -p release/windows
        cp src/multicoind.exe release/windows/
        cp src/multicoin-cli.exe release/windows/
        cp src/multicoin-tx.exe release/windows/
        cp src/qt/multicoin-qt.exe release/windows/
        cd release/windows
        zip -r multicoin-windows-x64.zip *
        
    - name: Upload Windows binaries
      uses: actions/upload-artifact@v4
      with:
        name: multicoin-windows-x64
        path: release/windows/multicoin-windows-x64.zip
