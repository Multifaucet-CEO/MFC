name: Build MFC Wallets

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        submodules: recursive
      
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libtool autotools-dev automake pkg-config bsdmainutils curl git
        sudo apt-get install -y g++-mingw-w64-x86-64 mingw-w64-x86-64-dev patch
        
        # CRITICAL: Set MinGW to use POSIX threads (required for std::mutex)
        sudo update-alternatives --set x86_64-w64-mingw32-g++ /usr/bin/x86_64-w64-mingw32-g++-posix
        sudo update-alternatives --set x86_64-w64-mingw32-gcc /usr/bin/x86_64-w64-mingw32-gcc-posix
        
    - name: Build dependencies
      run: |
        cd depends
        chmod +x config.guess config.sub
        find . -type f -name "*.sh" -exec chmod +x {} \;
        find . -type f -name "config.guess" -exec chmod +x {} \;
        find . -type f -name "config.sub" -exec chmod +x {} \;
        
        # Start building dependencies - Qt will fail first time
        make HOST=x86_64-w64-mingw32 -j$(nproc) || {
          echo "First build failed (expected - Qt needs patching)"
          
          # Find and patch Qt files
          QT_BUILD=$(find work/build/x86_64-w64-mingw32/qt -type d -name "qtbase" 2>/dev/null | head -n1)
          
          if [ -n "$QT_BUILD" ]; then
            echo "Patching Qt files in: $QT_BUILD"
            
            # Patch qbytearraymatcher.h
            if [ -f "$QT_BUILD/src/corelib/tools/qbytearraymatcher.h" ]; then
              sed -i '1i #include <limits>' "$QT_BUILD/src/corelib/tools/qbytearraymatcher.h"
              echo "✓ Patched qbytearraymatcher.h"
            fi
            
            # Patch qbytearray.cpp
            if [ -f "$QT_BUILD/src/corelib/tools/qbytearray.cpp" ]; then
              sed -i '1i #include <limits>' "$QT_BUILD/src/corelib/tools/qbytearray.cpp"
              echo "✓ Patched qbytearray.cpp"
            fi
            
            # Try build again
            echo "Retrying build with patched Qt..."
            make HOST=x86_64-w64-mingw32 -j$(nproc)
          else
            echo "ERROR: Could not find Qt build directory!"
            exit 1
          fi
        }
        
    - name: Build MFC for Windows
      run: |
        chmod +x autogen.sh
        chmod +x share/genbuild.sh
        ./autogen.sh
        CONFIG_SITE=$PWD/depends/x86_64-w64-mingw32/share/config.site ./configure --prefix=/
        make clean || true
        make -j$(nproc)
        
    - name: Create Windows artifacts
      run: |
        mkdir -p release/windows
        cp src/multicoind.exe release/windows/
        cp src/multicoin-cli.exe release/windows/
        cp src/multicoin-tx.exe release/windows/
        cp src/qt/multicoin-qt.exe release/windows/
        cd release/windows
        zip -r multicoin-windows-x64.zip *
        
    - name: Upload Windows binaries
      uses: actions/upload-artifact@v4
      with:
        name: multicoin-windows-x64
        path: release/windows/multicoin-windows-x64.zip
