name: Build MFC Wallets

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        submodules: recursive
      
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libtool autotools-dev automake pkg-config bsdmainutils curl git
        sudo apt-get install -y g++-mingw-w64-x86-64 mingw-w64-x86-64-dev patch
        
    - name: Build dependencies
      run: |
        cd depends
        chmod +x config.guess config.sub
        find . -type f -name "*.sh" -exec chmod +x {} \;
        find . -type f -name "config.guess" -exec chmod +x {} \;
        find . -type f -name "config.sub" -exec chmod +x {} \;
        make HOST=x86_64-w64-mingw32 GLIBC_BACK_COMPAT=1 -j$(nproc) || (
          echo "First build attempt failed, applying Qt patches..."
          find work/build -name "qbytearraymatcher.h" -exec sed -i '/#define QBYTEARRAYMATCHER_H/a #include <limits>' {} \; 2>/dev/null || true
          find work/build -name "qbytearray.cpp" -exec sed -i '1i #include <limits>' {} \; 2>/dev/null || true
          make HOST=x86_64-w64-mingw32 GLIBC_BACK_COMPAT=1 -j$(nproc)
        )
        
    - name: Build MFC for Windows
      run: |
        chmod +x autogen.sh
        chmod +x share/genbuild.sh
        ./autogen.sh
        CONFIG_SITE=$PWD/depends/x86_64-w64-mingw32/share/config.site ./configure --prefix=/ --enable-glibc-back-compat --enable-reduce-exports
        make -j$(nproc)
        
    - name: Create Windows artifacts
      run: |
        mkdir -p release/windows
        cp src/multicoind.exe release/windows/
        cp src/multicoin-cli.exe release/windows/
        cp src/multicoin-tx.exe release/windows/
        cp src/qt/multicoin-qt.exe release/windows/
        cd release/windows
        zip -r multicoin-windows-x64.zip *
        
    - name: Upload Windows binaries
      uses: actions/upload-artifact@v4
      with:
        name: multicoin-windows-x64
        path: release/windows/multicoin-windows-x64.zip
