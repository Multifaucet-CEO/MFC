name: Build Linux x86_64

on:
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential libtool autotools-dev automake pkg-config \
            libssl-dev libevent-dev bsdmainutils \
            libboost-system-dev libboost-filesystem-dev \
            libboost-chrono-dev libboost-test-dev libboost-thread-dev \
            libminiupnpc-dev libzmq3-dev

      - name: Build daemon
        run: |
          ./autogen.sh
          ./configure --without-gui
          make -j$(nproc)
          strip src/multicoind

      - name: Package binary
        run: |
          mkdir -p dist
          cp src/multicoind dist/
          tar czf multicoin-linux-x64.tar.gz -C dist .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: multicoin-linux-x64
          path: multicoin-linux-x64.tar.gz
